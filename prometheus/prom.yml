global:
  scrape_interval: 15s # Default scrape interval

scrape_configs:
  - job_name: service-order-release
    scheme: https
    metrics_path: /metrics
    static_configs:
      - targets:
          - profinders-microservice-serviceorder-release.up.railway.app
        labels:
          app: service-order
          env: release

